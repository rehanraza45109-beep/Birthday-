<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Memories ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
#lightbox{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.95);
justify-content:center;
align-items:center;
z-index:9999;
}

#lightbox img{
max-width:90%;
max-height:90%;
border-radius:20px;
box-shadow:0 0 25px white;
animation:zoom .3s ease;
}

#close{
position:absolute;
top:20px;
right:30px;
font-size:40px;
color:white;
cursor:pointer;
}

@keyframes zoom{
from{
transform:scale(.5);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:linear-gradient(135deg,#ff9ecf,#ffd6e7);
overflow-x:hidden;
text-align:center;
padding:20px;
}

h1{
font-family:'Great Vibes',cursive;
font-size:60px;
color:#fff;
margin-top:20px;
text-shadow:0 0 15px #ff2f92;
}

p{
color:white;
font-size:18px;
margin-top:10px;
margin-bottom:25px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:15px;
}

.gallery img{
width:100%;
height:220px;
object-fit:cover;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.25);
transition:.4s;
}

.gallery img:hover{
transform:scale(1.05);
}

.btn{
display:inline-block;
margin-top:30px;
padding:15px 35px;
background:#ff2f92;
color:white;
text-decoration:none;
font-size:22px;
font-weight:bold;
border-radius:40px;
box-shadow:0 0 20px #ff2f92;
}
</style>
</head>

<body>

<h1>your Memories ❤️</h1>

<p>
Every picture holds a beautiful memory of you. ✨
</p>

<div class="gallery">
  <img src="./Snapchat-1390719690.jpg" alt="Photo 1">

<img src="./Snapchat-1458651801.jpg" alt="Photo 2">

<img src="./Snapchat-1914949940.jpg" alt="Photo 3">

<img src="./Snapchat-439536938.jpg" alt="Photo 4">

<img src="./Snapchat-541673786.jpg" alt="Photo 5">

<img src="./Snapchat-548884644.jpg" alt="Photo 6">
</div>

<a class="btn" href="message.html">
Next Surprise 🎁
</a>
<div id="lightbox">
    <span id="close">&times;</span>
    <img id="lightbox-img">
</div>

<script>
const images = document.querySelectorAll(".gallery img");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");
const closeBtn = document.getElementById("close");

images.forEach(img=>{
    img.onclick=function(){
        lightbox.style.display="flex";
        lightboxImg.src=this.src;
    }
});

closeBtn.onclick=function(){
    lightbox.style.display="none";
}

lightbox.onclick=function(e){
    if(e.target===lightbox){
        lightbox.style.display="none";
    }
}
</script>
